# === docker-compose.yml ===
# Smart Truck Loading Optimization System (STLOS) — Development Environment
# Dependencies: Docker, Docker Compose v2
#
# USAGE:
#   docker compose up -d          # Start all services
#   docker compose logs -f        # Follow logs
#   docker compose down -v        # Stop and remove volumes
#
# IMPORTANT: Before first run, prepare OSRM data:
#   mkdir -p osrm-data
#   wget https://download.geofabrik.de/asia/india-latest.osm.pbf -O osrm-data/india.osm.pbf
#   docker run -t -v ./osrm-data:/data osrm/osrm-backend osrm-extract -p /opt/car.lua /data/india.osm.pbf
#   docker run -t -v ./osrm-data:/data osrm/osrm-backend osrm-partition /data/india.osrm
#   docker run -t -v ./osrm-data:/data osrm/osrm-backend osrm-customize /data/india.osrm

