services:
  postgres:
    image: postgres:15-alpine
    container_name: trucksetu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: stlos_user
      POSTGRES_PASSWORD: stlos_pass
      POSTGRES_DB: stlos_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stlos_user -d stlos_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: trucksetu-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  node-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: trucksetu-node-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: 500
      CORS_ORIGIN: http://localhost:3000
      APP_BASE_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres.rmltpmdwikneodahzfns:NCCGl8DwcCDOVo9w@aws-1-ap-south-1.pooler.supabase.com:6543/postgres?pgbouncer=true
      DIRECT_URL: postgresql://postgres.rmltpmdwikneodahzfns:NCCGl8DwcCDOVo9w@aws-1-ap-south-1.pooler.supabase.com:5432/postgres
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-to-a-long-random-secret
      JWT_REFRESH_SECRET: change-me-to-a-different-long-random-refresh-secret
      ACCESS_TOKEN_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 30d
      COOKIE_SECURE: "false"
      COOKIE_SAME_SITE: lax
      COOKIE_DOMAIN: ""
      EMAIL_VERIFICATION_TOKEN_TTL_HOURS: 24
      PASSWORD_RESET_TOKEN_TTL_HOURS: 2
      PYTHON_ML_URL: http://python-ml:8000
      OSRM_URL: http://osrm:5000
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: your-email@gmail.com
      SMTP_PASS: your-app-password
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: stlos-documents
      BOOKING_TIMEOUT_HOURS: 2
      RETURN_LOAD_EXPIRY_HOURS: 4
      GPS_UPDATE_INTERVAL_MS: 10000
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app/backend
      - ./prisma:/app/prisma
      - backend_node_modules:/app/backend/node_modules
    command: >
      sh -c "npx prisma generate --schema /app/prisma/schema.prisma &&
             npx prisma migrate deploy --schema /app/prisma/schema.prisma &&
             npm run dev -- --legacy-watch"

  python-ml:
    build:
      context: .
      dockerfile: ml-service/Dockerfile
    container_name: trucksetu-python-ml
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres.rmltpmdwikneodahzfns:NCCGl8DwcCDOVo9w@aws-1-ap-south-1.pooler.supabase.com:6543/postgres?pgbouncer=true
      OSRM_URL: http://osrm:5000
      PORT: 8000
      ENVIRONMENT: development
      LOG_LEVEL: info
    ports:
      - "8000:8000"
    volumes:
      - ./ml-service:/app

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: trucksetu-frontend
    restart: unless-stopped
    depends_on:
      - node-api
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: 300
      VITE_API_URL: http://localhost:4000/api
      VITE_SOCKET_URL: http://localhost:4000
      VITE_OSRM_URL: http://router.project-osrm.org
      VITE_MAP_DEFAULT_CENTER_LAT: 21.1702
      VITE_MAP_DEFAULT_CENTER_LNG: 72.8311
      VITE_MAP_DEFAULT_ZOOM: 6
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  osrm:
    image: osrm/osrm-backend
    container_name: trucksetu-osrm
    profiles: ["maps"]
    ports:
      - "5000:5000"
    command: osrm-routed --algorithm mld /data/india.osrm
    volumes:
      - ./osrm-data:/data

  minio:
    image: minio/minio
    container_name: trucksetu-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  redisdata:
  miniodata:
  backend_node_modules:
  frontend_node_modules:
