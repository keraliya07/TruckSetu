# ============================================================
# docker-compose.example.yml — STLOS Local Development Stack
# ============================================================
# USAGE:
#   1. Copy this file  →  cp docker-compose.example.yml docker-compose.yml
#   2. Optionally tweak passwords / ports
#   3. Run  →  docker compose up -d
# ============================================================

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: stlos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: stlos_user
      POSTGRES_PASSWORD: stlos_pass
      POSTGRES_DB: stlos_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stlos_user -d stlos_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: stlos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Node.js API (Backend) ─────────────────────────────────
  node-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: stlos-node-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: 500
      CORS_ORIGIN: http://localhost:3000
      APP_BASE_URL: http://localhost:3000

      # Database — uses the local postgres container
      DATABASE_URL: postgresql://stlos_user:stlos_pass@postgres:5432/stlos_db
      DIRECT_URL: postgresql://stlos_user:stlos_pass@postgres:5432/stlos_db

      # Redis — uses the local redis container
      REDIS_URL: redis://redis:6379

      # JWT — CHANGE THESE for any real usage
      JWT_SECRET: change-me-to-a-long-random-secret
      JWT_REFRESH_SECRET: change-me-to-a-different-long-random-refresh-secret
      ACCESS_TOKEN_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 30d

      # Cookies
      COOKIE_SECURE: "false"
      COOKIE_SAME_SITE: lax
      COOKIE_DOMAIN: ""
      EMAIL_VERIFICATION_TOKEN_TTL_HOURS: 24
      PASSWORD_RESET_TOKEN_TTL_HOURS: 2

      # Services
      PYTHON_ML_URL: http://python-ml:8000
      OSRM_URL: http://router.project-osrm.org

      # Email — fill in your own SMTP credentials
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: your-email@gmail.com
      SMTP_PASS: your-app-password

      # MinIO — uses the local minio container
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-trucksetuadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-trucksetuadmin123}
      MINIO_BUCKET: stlos-documents

      # Jobs & GPS
      BOOKING_TIMEOUT_HOURS: 2
      RETURN_LOAD_EXPIRY_HOURS: 4
      GPS_UPDATE_INTERVAL_MS: 10000
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app/backend
      - ./prisma:/app/prisma
      - backend_node_modules:/app/backend/node_modules
    command: >
      sh -c "npx prisma generate --schema /app/prisma/schema.prisma &&
             npx prisma migrate deploy --schema /app/prisma/schema.prisma &&
             npm run dev -- --legacy-watch"

  # ── Python ML Service ─────────────────────────────────────
  python-ml:
    build:
      context: .
      dockerfile: ml-service/Dockerfile
    container_name: stlos-python-ml
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://stlos_user:stlos_pass@postgres:5432/stlos_db
      OSRM_URL: http://router.project-osrm.org
      PORT: 8000
      ENVIRONMENT: development
      LOG_LEVEL: info
    ports:
      - "8000:8000"
    volumes:
      - ./ml-service:/app

  # ── Vite Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: stlos-frontend
    restart: unless-stopped
    depends_on:
      - node-api
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: 300
      VITE_API_URL: http://localhost:4000/api
      VITE_SOCKET_URL: http://localhost:4000
      VITE_OSRM_URL: http://router.project-osrm.org
      VITE_MAP_DEFAULT_CENTER_LAT: 21.1702
      VITE_MAP_DEFAULT_CENTER_LNG: 72.8311
      VITE_MAP_DEFAULT_ZOOM: 6
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  # ── OSRM (Optional — enable with: docker compose --profile maps up) ──
  osrm:
    image: osrm/osrm-backend
    container_name: stlos-osrm
    profiles: ["maps"]
    ports:
      - "5000:5000"
    command: osrm-routed --algorithm mld /data/india.osrm
    volumes:
      - ./osrm-data:/data

  # ── MinIO (Object Storage) ────────────────────────────────
  minio:
    image: minio/minio
    container_name: stlos-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-trucksetuadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-trucksetuadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  redisdata:
  miniodata:
  backend_node_modules:
  frontend_node_modules:
